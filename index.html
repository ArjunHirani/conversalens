<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ConversaLens — Conversation Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: #1e2230;
    --accent: #5b7cf6;
    --accent-dim: #2d3d8a;
    --text: #e2e6f0;
    --text-muted: #6b7394;
    --text-dim: #3d4460;
    --tag-bg: #161b2e;
    --green: #3ecf8e;
    --amber: #f59e0b;
    --red: #ef4444;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span { color: var(--text-muted); font-weight: 400; }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.loading { background: var(--amber); animation: pulse 1s infinite; }

  @keyframes pulse { 50% { opacity: 0.3; } }

  .main {
    display: grid;
    grid-template-columns: 280px 1fr 300px;
    flex: 1;
    overflow: hidden;
  }

  .panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel:last-child { border-right: none; border-left: 1px solid var(--border); }

  .panel-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .stat-label { font-size: 11px; color: var(--text-muted); }
  .stat-val {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
  }

  .checkpoint-card {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .checkpoint-card:hover { border-color: var(--accent-dim); }

  .checkpoint-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .checkpoint-summary {
    color: var(--text-muted);
    line-height: 1.5;
    font-size: 11px;
  }

  .keyword-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .tag {
    background: var(--accent-dim);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  .chat-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .quick-prompts {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    background: var(--surface);
  }

  .qp-btn {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .qp-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 85%;
  }

  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.bot { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 4px;
    letter-spacing: 0.08em;
  }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .message.user .msg-bubble {
    background: var(--accent-dim);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 8px 8px 2px 8px;
  }

  .message.bot .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px 8px 8px 2px;
  }

  .msg-sources {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px 8px 8px 2px;
  }

  .typing-dot {
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .input-row {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    background: var(--surface);
  }

  .chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 6px;
    outline: none;
    resize: none;
    transition: border-color 0.15s;
    min-height: 42px;
    max-height: 120px;
  }

  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--text-dim); }

  .send-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .right-panel { padding: 16px; }

  .persona-section { margin-bottom: 16px; }

  .persona-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .persona-row {
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }

  .persona-key { color: var(--text-muted); margin-bottom: 2px; }
  .persona-val { color: var(--text); font-family: var(--mono); font-size: 10px; line-height: 1.5; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
    gap: 12px;
  }

  .empty-glyph {
    font-family: var(--mono);
    font-size: 36px;
    color: var(--text-dim);
    opacity: 0.3;
  }

  .empty-hint { font-size: 12px; color: var(--text-muted); line-height: 1.6; max-width: 300px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">ConversaLens <span>/ RAG</span></div>
  <div class="status-pill">
    <div class="dot loading" id="statusDot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</header>

<div class="main">
  <div class="panel" id="leftPanel">
    <div class="panel-label">System Stats</div>
    <div id="statsArea">
      <div class="stat-row"><span class="stat-label">Messages</span><span class="stat-val" id="statMessages">—</span></div>
      <div class="stat-row"><span class="stat-label">Topic Checkpoints</span><span class="stat-val" id="statTopics">—</span></div>
      <div class="stat-row"><span class="stat-label">100-msg Blocks</span><span class="stat-val" id="statBlocks">—</span></div>
      <div class="stat-row"><span class="stat-label">Vector Index</span><span class="stat-val" id="statVectors">—</span></div>
    </div>

    <div class="panel-label" style="margin-top:12px">Topic Segments</div>
    <div id="topicList" style="display:flex;flex-direction:column;gap:6px;"></div>
  </div>

  <div class="chat-area">
    <div class="quick-prompts">
      <button class="qp-btn" onclick="sendQuick('What kind of person is this user?')">What kind of person is this?</button>
      <button class="qp-btn" onclick="sendQuick('What are their habits?')">Habits & routines</button>
      <button class="qp-btn" onclick="sendQuick('How do they talk and communicate?')">Communication style</button>
      <button class="qp-btn" onclick="sendQuick('What topics do they talk about most?')">Main topics</button>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-glyph">⊕</div>
        <div class="empty-hint">Ask anything about the user from their conversations. The RAG system will retrieve relevant topic summaries and message chunks to answer.</div>
      </div>
    </div>

    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="Ask about the user…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
    </div>
  </div>

  <div class="panel right-panel" id="rightPanel">
    <div class="panel-label">User Persona</div>
    <div id="personaArea">
      <div style="color:var(--text-dim);font-size:11px">Loading persona…</div>
    </div>
  </div>
</div>

<script>
  const API = window.API_BASE || 'https://conversalens.onrender.com';

  async function loadStats() {
    try {
      const r = await fetch(`${API}/stats`);
      if (!r.ok) throw new Error();
      const d = await r.json();
      document.getElementById('statMessages').textContent = d.total_messages.toLocaleString();
      document.getElementById('statTopics').textContent = d.topic_checkpoints.toLocaleString();
      document.getElementById('statBlocks').textContent = d.hundred_checkpoints.toLocaleString();
      document.getElementById('statVectors').textContent = d.vector_store_size.toLocaleString();

      const dot = document.getElementById('statusDot');
      dot.className = 'dot live';
      document.getElementById('statusText').textContent = 'Ready';
    } catch {
      document.getElementById('statusText').textContent = 'Offline';
      document.getElementById('statusDot').className = 'dot';
    }
  }

  async function loadTopics() {
    try {
      const r = await fetch(`${API}/checkpoints/topics?limit=30`);
      const d = await r.json();
      const container = document.getElementById('topicList');
      d.items.forEach(cp => {
        const card = document.createElement('div');
        card.className = 'checkpoint-card';
        card.innerHTML = `
          <div class="checkpoint-id">T${cp.topic_id} · msgs ${cp.start_global_idx}–${cp.end_global_idx}</div>
          <div class="checkpoint-summary">${cp.summary.slice(0, 120)}…</div>
          <div class="keyword-tags">${cp.keywords.slice(0,4).map(k => `<span class="tag">${k}</span>`).join('')}</div>
        `;
        container.appendChild(card);
      });
    } catch {}
  }

  async function loadPersona() {
    try {
      const r = await fetch(`${API}/persona`);
      const d = await r.json();
      const area = document.getElementById('personaArea');

      const sections = [
        { title: 'Personality Traits', val: d.personality_traits?.join('\n') || '—' },
        { title: 'Jobs / Roles', val: d.jobs?.join(', ') || '—' },
        { title: 'Locations', val: d.locations?.join(', ') || '—' },
        { title: 'Hobbies', val: d.hobbies?.slice(0,5).join(', ') || '—' },
        { title: 'Relationships', val: d.relationships?.join(', ') || '—' },
        { title: 'Sleep Signals', val: d.sleep_signals?.join(', ') || 'None detected' },
        { title: 'Food Habits', val: d.food_habits?.slice(0,3).join('\n') || 'None detected' },
        { title: 'Avg Words/Msg', val: d.communication_style?.avg_words_per_message ?? '—' },
        { title: 'Emoji Usage', val: d.communication_style?.emoji_usage || '—' },
        { title: 'Question Style', val: d.communication_style?.question_style || '—' },
      ];

      area.innerHTML = sections.map(s => `
        <div class="persona-row">
          <div class="persona-key">${s.title}</div>
          <div class="persona-val">${s.val}</div>
        </div>
      `).join('');
    } catch {}
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    document.getElementById('emptyState')?.remove();

    appendMessage('user', text);

    const typingEl = appendTyping();

    try {
      const r = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const d = await r.json();
      typingEl.remove();
      appendMessage('bot', d.answer, d.sources);
    } catch {
      typingEl.remove();
      appendMessage('bot', 'Could not reach the API. Make sure the FastAPI server is running.');
    }
  }

  function sendQuick(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
  }

  function appendMessage(role, text, sources) {
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'YOU' : 'CONVERSALENS';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);

    if (sources) {
      const src = document.createElement('div');
      src.className = 'msg-sources';
      src.textContent = `↳ ${sources.topic_summaries_used} topic chunks · ${sources.message_chunks_used} message chunks`;
      wrap.appendChild(src);
    }

    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
    return wrap;
  }

  function appendTyping() {
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'message bot';
    wrap.innerHTML = `
      <div class="msg-label">CONVERSALENS</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
    return wrap;
  }

  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  loadStats();
  loadTopics();
  loadPersona();
</script>
</body>
</html>
